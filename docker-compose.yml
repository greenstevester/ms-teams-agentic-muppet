services:
  ms-teams-agentic-muppet:
    build: .
    container_name: ms-teams-agentic-muppet
    ports:
      - "3978:3978"
    environment:
      # Claude Agent SDK backend — pick ONE path; the SDK picks based on which is set.
      #   Bedrock (recommended for enterprise / AWS shops):
      #     Run `aws configure sso` or `aws configure` on the host. The compose
      #     file bind-mounts ~/.aws into the container, so the SDK picks up
      #     creds automatically — just set CLAUDE_CODE_USE_BEDROCK=1 and
      #     AWS_PROFILE in .env.
      #   Direct Anthropic API (no AWS account needed):
      #     Set ANTHROPIC_API_KEY in .env. Leave the Bedrock vars blank.
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}

      # Bot Framework — leave blank for Emulator-only local dev.
      MS_APP_ID: ${MS_APP_ID:-}
      MS_APP_PASSWORD: ${MS_APP_PASSWORD:-}
      MS_APP_TYPE: ${MS_APP_TYPE:-MultiTenant}
      MS_APP_TENANT_ID: ${MS_APP_TENANT_ID:-}

      # qmd memory + zone paths inside the container
      CONTEXT_REPO: /app/context
      ZONES_DIR: /app/zones
    volumes:
      # Channel + user qmd memory. Bind-mounted from the repo, committed to git.
      # Edit host files to seed memory; the bot reads them on every turn.
      - ./context:/app/context

      # Zone definitions (system prompts, per-zone MCP servers). Committed to git.
      - ./zones:/app/zones

      # Per-thread agent sandboxes. Named Docker volume — NOT bind-mounted to
      # the host. Survives `docker compose down`, wiped by `docker compose down -v`.
      # Inspect with: `docker compose exec ms-teams-agentic-muppet ls /app/workspaces`
      - workspaces:/app/workspaces

      # AWS credentials + SSO token cache. Docker named volume — NOT a host
      # bind mount, so no host AWS CLI is required. Persists across restarts,
      # rebuilds, and `docker compose down`. Wiped by `docker compose down -v`.
      #
      # First-time setup:
      #   docker compose run --rm ms-teams-agentic-muppet aws configure sso
      # Refresh expired SSO token:
      #   docker compose exec ms-teams-agentic-muppet aws sso login
      # Inspect:
      #   docker compose exec ms-teams-agentic-muppet aws sts get-caller-identity
      - aws-creds:/root/.aws
    restart: unless-stopped

  # Only needed once you graduate from the Bot Framework Emulator
  # to real Teams. Comment out for Emulator-only local dev.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ms-teams-agentic-muppet-tunnel
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - ms-teams-agentic-muppet
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  workspaces:
  aws-creds:
