services:
  ms-teams-agentic-muppet:
    build: .
    container_name: ms-teams-agentic-muppet
    ports:
      - "3978:3978"
    environment:
      # Claude Agent SDK backend — pick ONE path; the SDK picks based on which is set.
      #   Local dev: set ANTHROPIC_API_KEY in .env  → calls api.anthropic.com directly.
      #   Production: set CLAUDE_CODE_USE_BEDROCK=1 + AWS_* creds → calls Bedrock directly.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}

      # Bot Framework — leave blank for Emulator-only local dev.
      MS_APP_ID: ${MS_APP_ID:-}
      MS_APP_PASSWORD: ${MS_APP_PASSWORD:-}
      MS_APP_TYPE: ${MS_APP_TYPE:-MultiTenant}
      MS_APP_TENANT_ID: ${MS_APP_TENANT_ID:-}

      # qmd memory + zone paths inside the container
      CONTEXT_REPO: /app/context
      ZONES_DIR: /app/zones
    volumes:
      - ./context:/app/context
      - ./zones:/app/zones
      - workspaces:/app/workspaces
    restart: unless-stopped

  # Only needed once you graduate from the Bot Framework Emulator
  # to real Teams. Comment out for Emulator-only local dev.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ms-teams-agentic-muppet-tunnel
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - ms-teams-agentic-muppet
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  workspaces:
